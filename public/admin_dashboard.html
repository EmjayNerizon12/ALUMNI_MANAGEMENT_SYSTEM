<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/theme.css">
    <script src="/assets/theme.js" defer></script>
    <script src="partials/admin/logout.js"></script>
    <style>
        :root {
            --ink: #0f1b2d;
            --muted: #5f6b7a;
            --primary: #1e3a8a;
            --primary-2: #2563eb;
            --surface: #ffffff;
            --border: rgba(15, 27, 45, 0.08);
            --shadow: 0 20px 60px rgba(15, 27, 45, 0.12);
            --page-bg: radial-gradient(1200px 600px at 10% -10%, #e0e7ff 0%, transparent 60%),
                        radial-gradient(900px 500px at 110% 10%, #dbeafe 0%, transparent 55%),
                        linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
        }

        [data-bs-theme="dark"] {
            --ink: #e6edf7;
            --muted: #9aa4b2;
            --primary: #6aa2ff;
            --primary-2: #8bb3ff;
            --surface: #0f172a;
            --border: rgba(148, 163, 184, 0.2);
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
            --page-bg: radial-gradient(1200px 600px at 10% -10%, rgba(56, 78, 150, 0.35) 0%, transparent 60%),
                        radial-gradient(900px 500px at 110% 10%, rgba(59, 130, 246, 0.2) 0%, transparent 55%),
                        linear-gradient(180deg, #0b1020 0%, #0f172a 100%);
        }

        html {
            font-size: clamp(15px, 1.1vw + 10px, 18px);
        }

        body {
            background: var(--page-bg);
            font-family: "Space Grotesk", "Segoe UI", Arial, sans-serif;
            color: var(--ink);
        }

        .app-shell {
            padding-top: 76px;
        }

        .topbar {
            background: rgba(15, 23, 42, 0.94);
            backdrop-filter: blur(10px);
        }

        [data-bs-theme="light"] .topbar {
            background: rgba(30, 58, 138, 0.95);
        }

        .brand-chip {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 6px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
        }

        .hero-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 26px;
            box-shadow: var(--shadow);
            padding: 36px;
            position: relative;
            overflow: hidden;
        }

        .hero-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, rgba(37, 99, 235, 0.15), transparent 60%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .logo-ring {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.18);
        }

        .subtitle {
            color: var(--muted);
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            padding: 10px 24px;
            font-weight: 600;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(37, 99, 235, 0.3);
        }

        .hero-badge {
            letter-spacing: 0.14em;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary-2);
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark fixed-top topbar shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/admin-dashboard">
                <span class="brand-chip">
                    <img src="/logo.png" alt="PSU Logo" height="32" width="32" class="rounded-circle">
                    <span class="fw-semibold">Alumni Survey</span>
                </span>
            </a>

            <div class="d-flex align-items-center gap-2">
                <button type="button" class="btn btn-outline-light btn-sm" data-theme-toggle>
                    <span data-theme-toggle-label>Dark mode</span>
                </button>

                <div class="dropdown">
                    <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" id="userMenu"
                        data-bs-toggle="dropdown" aria-expanded="false">
                        Admin
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenu">
                        <li><a class="dropdown-item" href="/admin-dashboard">Dashboard</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item" onclick="logout()">Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <main class="container app-shell pb-5 mt-5">
        <div class="hero-card text-center">
            <div class="hero-content">
                <div class="hero-badge mb-2">WELCOME TO</div>
                <div class="logo-ring mx-auto mb-3">
                    <img src="/logo.png" alt="PSU Logo" height="150" width="150" class="rounded-circle">
                </div>
                <h1 class="h3 fw-bold mb-1">School College University</h1>
                <div class="subtitle fw-semibold mb-3">Univesity Campus</div>
                <div class="h4 fw-bold text-primary mb-3">ALUMNI SURVEY SYSTEM</div>
                <button onclick="window.location.href='/admin-account'" class="btn btn-primary">
                    Open Dashboard
                </button>
            </div>
        </div>
    </main>
</body>

</html>
