<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
		    <title>Alumni Home</title>
	    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	    <link rel="stylesheet" href="/assets/theme.css">
	    <script src="/assets/theme.js" defer></script>
	    <script src="partials/alumni/logout.js"></script>
</head>

	<body class="bg-body-tertiary">
	    <nav class="navbar navbar-dark bg-primary fixed-top shadow-sm">
	        <div class="container-fluid">
	            <a class="navbar-brand d-flex align-items-center gap-2" href="/alumni-home">
	                <img src="/psu-logo.png" alt="PSU Logo" height="36" width="36" class="rounded-circle">
	                <span class="fw-semibold">Alumni Survey</span>
	            </a>

	            <div class="d-flex align-items-center gap-2">
	                <button type="button" class="btn btn-outline-light btn-sm" data-theme-toggle>
	                    <span data-theme-toggle-label>Dark mode</span>
	                </button>

	                <button class="navbar-toggler d-lg-none" type="button" data-bs-toggle="offcanvas"
	                    data-bs-target="#navSidebar" aria-controls="navSidebar" aria-label="Open menu">
	                    <span class="navbar-toggler-icon"></span>
	                </button>

	                <div class="dropdown">
	                    <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" id="userMenu"
	                        data-bs-toggle="dropdown" aria-expanded="false">
	                        Alumni
	                    </button>
	                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenu">
	                        <li><a class="dropdown-item" href="/alumni-home">Home</a></li>
	                        <li>
	                            <hr class="dropdown-divider">
	                        </li>
	                        <li><a class="dropdown-item" onclick="logout()">Logout</a></li>
	                    </ul>
	                </div>
	            </div>
	        </div>
	    </nav>

	    <div class="offcanvas offcanvas-start d-lg-none" tabindex="-1" id="navSidebar" aria-labelledby="navSidebarLabel">
	        <div class="offcanvas-header">
	            <h5 class="offcanvas-title" id="navSidebarLabel">Menu</h5>
	            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
	        </div>
	        <div class="offcanvas-body p-0">
	            <nav class="nav nav-pills flex-column gap-1 p-3">
	                <a class="nav-link active" href="/alumni-home">Home</a>
	                <a class="nav-link" href="/alumni-account#survey">Take Survey</a>
	                <a class="nav-link" href="/alumni-account#job">Job History</a>
	            </nav>
	        </div>
	    </div>

	    <div class="container-fluid pt-4" style="margin-top: 72px;">
	        <div class="row g-3">
	            <aside class="col-lg-2 d-none d-lg-block">
	                <div class="card shadow-sm border-0">
	                    <div class="card-body p-2">
	                        <nav class="nav nav-pills flex-column gap-1">
	                            <a class="nav-link active" href="/alumni-home">Home</a>
	                            <a class="nav-link" href="/alumni-account#survey">Take Survey</a>
	                            <a class="nav-link" href="/alumni-account#job">Job History</a>
	                        </nav>
	                    </div>
	                </div>
	            </aside>

	            <main class="col-lg-10">
	                <div class="card shadow-sm border-0">
	                    <div class="card-body p-4 p-md-5 text-center">
	                        <div class="text-primary fw-bold mb-2">WELCOME TO</div>
	                        <img src="/psu-logo.png" alt="PSU Logo" height="220" width="220"
	                            class="rounded-circle shadow-sm mb-3">
	                        <h1 class="h3 fw-bold mb-1">Pangasinan State University</h1>
	                        <div class="text-body-secondary fw-semibold mb-4">San Carlos Campus</div>
	                        <div class="h4 fw-bold text-primary mb-0">ALUMNI SURVEY SYSTEM</div>
	                    </div>
	                </div>
	            </main>
	        </div>
	    </div>
	</body>

</html>
