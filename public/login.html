<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Survey System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/theme.css">
    <script src="/assets/theme.js" defer></script>
    <style>
        :root {
            --ink: #0f1b2d;
            --muted: #5f6b7a;
            --primary: #1e3a8a;
            --primary-2: #2563eb;
            --surface: #ffffff;
            --border: rgba(15, 27, 45, 0.08);
            --shadow: 0 20px 60px rgba(15, 27, 45, 0.12);
            --page-bg: radial-gradient(1200px 600px at 10% -10%, #e0e7ff 0%, transparent 60%),
                        radial-gradient(900px 500px at 110% 10%, #dbeafe 0%, transparent 55%),
                        linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
        }

        [data-bs-theme="dark"] {
            --ink: #e6edf7;
            --muted: #9aa4b2;
            --primary: #6aa2ff;
            --primary-2: #8bb3ff;
            --surface: #0f172a;
            --border: rgba(148, 163, 184, 0.2);
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
            --page-bg: radial-gradient(1200px 600px at 10% -10%, rgba(56, 78, 150, 0.35) 0%, transparent 60%),
                        radial-gradient(900px 500px at 110% 10%, rgba(59, 130, 246, 0.2) 0%, transparent 55%),
                        linear-gradient(180deg, #0b1020 0%, #0f172a 100%);
        }

        html {
            font-size: clamp(15px, 1.1vw + 10px, 18px);
        }

        body {
            min-height: 100vh;
            background: var(--page-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: "Space Grotesk", "Segoe UI", Arial, sans-serif;
            color: var(--ink);
        }
        .login-container {
            max-width: 480px;
            width: 100%;
        }
        .auth-card {
            border: 1px solid var(--border);
            border-radius: 22px;
            box-shadow: var(--shadow);
            background: var(--surface);
            position: relative;
            overflow: hidden;
        }
        .auth-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.08), transparent 55%);
            pointer-events: none;
        }
        .theme-toggle-wrapper {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 2;
        }
        .logo-wrapper {
            width: 72px;
            height: 72px;
            background: var(--surface);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 24px rgba(15, 27, 45, 0.12);
        }
        [data-bs-theme="dark"] .logo-wrapper {
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(30, 58, 138, 0.25);
            background: linear-gradient(135deg, var(--primary-2), var(--primary));
        }
        .form-control:focus {
            border-color: var(--primary-2);
            box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.15);
        }
        .btn-link {
            color: var(--primary-2);
            font-weight: 500;
        }
        .btn-link:hover {
            color: var(--primary);
        }
        .subtitle {
            color: var(--muted);
        }
        .form-label {
            color: var(--ink);
        }
        .form-control {
            border-radius: 12px;
            border-color: var(--border);
            background-color: var(--surface);
            color: var(--ink);
        }
        .form-control::placeholder {
            color: var(--muted);
        }
        .helper {
            color: var(--muted);
            font-size: 0.9rem;
        }
        .theme-toggle-wrapper .btn {
            border-radius: 999px;
            padding: 6px 12px;
        }
        .section-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 8px;
        }
        .form-stack {
            display: grid;
            gap: 16px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 576px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        .card-body {
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="theme-toggle-wrapper">
        <button type="button" class="btn btn-outline-secondary btn-sm" data-theme-toggle>
            <span data-theme-toggle-label>Theme</span>
        </button>
    </div>

    <div class="login-container">
        <div class="auth-card">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="logo-wrapper">
                        <img src="/logo.png" alt="PSU Logo" height="100" width="100" class="rounded-circle">
                    </div>
                    <h1 class="h3 fw-bold mb-2">Alumni Survey System</h1>
                    <p class="subtitle small">Access your surveys and alumni profile</p>
                </div>

                <!-- LOGIN FORM -->
                <div id="loginForm">
                    <form id="loginFormElement">
                        <div class="form-stack">
                            <div>
                                <label class="form-label fw-semibold">Username</label>
                                <input type="text" name="login_username" class="form-control form-control-lg" autocomplete="username" required>
                            </div>
                            <div>
                                <label class="form-label fw-semibold">Password</label>
                                <input type="password" name="login_password" class="form-control form-control-lg" autocomplete="current-password" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100">Login</button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <span class="helper">Don't have an account?</span>
                        <button type="button" class="btn btn-link btn-sm text-decoration-none p-0 ms-1" onclick="showRegisterForm()">Register</button>
                    </div>
                </div>

                <!-- REGISTER FORM -->
                <div id="registerForm" class="d-none">
                    <form id="registerFormElement">
                        <div class="form-stack">
                            <div>
                                <div class="section-title">Personal details</div>
                                <div class="form-row">
                                    <div>
                                        <label class="form-label">First name</label>
                                        <input type="text" class="form-control" name="register_fname" required>
                                    </div>
                                    <div>
                                        <label class="form-label">Last name</label>
                                        <input type="text" class="form-control" name="register_lname" required>
                                    </div>
                                </div>
                            </div>
                            <div>
                                <label class="form-label">Contact number</label>
                                <input type="text" class="form-control" name="register_contact_number" required>
                            </div>
                            <div>
                                <div class="section-title">Account details</div>
                                <div class="form-stack">
                                    <div>
                                        <label class="form-label">Username</label>
                                        <input type="text" class="form-control" name="register_username" autocomplete="username" required>
                                    </div>
                                    <div>
                                        <label class="form-label">Password</label>
                                        <input type="password" class="form-control" name="register_password" autocomplete="new-password" required>
                                    </div>
                                    <div>
                                        <label class="form-label">Confirm password</label>
                                        <input type="password" class="form-control" name="register_confirm_password" autocomplete="new-password" required>
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100">Register</button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <span class="helper">Already have an account?</span>
                        <button type="button" class="btn btn-link btn-sm text-decoration-none p-0 ms-1" onclick="showLoginForm()">Login</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const loginCard = document.getElementById('loginForm');
        const registerCard = document.getElementById('registerForm');

        function showRegisterForm() {
            loginCard.classList.add('d-none');
            registerCard.classList.remove('d-none');
        }

        function showLoginForm() {
            loginCard.classList.remove('d-none');
            registerCard.classList.add('d-none');
        }

        const registerForm = document.querySelector('#registerFormElement');
        registerForm.addEventListener('submit', async function (event) {
            event.preventDefault();

            const form = event.target;

            const data = {
                fname: form.register_fname.value,
                lname: form.register_lname.value,
                contact_no: form.register_contact_number.value,
                username: form.register_username.value,
                password: form.register_password.value,
                confirm_password: form.register_confirm_password.value
            };

            if (data.password !== data.confirm_password) {
                alert("Passwords do not match!");
                return;
            }

            try {
                const response = await fetch('/api-register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fname: data.fname,
                        lname: data.lname,
                        contact_no: data.contact_no,
                        username: data.username,
                        password: data.password
                    })
                });

                if (response.ok) {
                    alert("Registration successful!");
                    showLoginForm();
                } else {
                    const errorData = await response.json();
                    alert("Registration failed: " + errorData.message);
                }
            } catch (error) {
                console.error("Error during registration:", error);
                alert("An error occurred. Please try again.");
            }
        });

        const loginForm = document.querySelector('#loginFormElement');
        loginForm.addEventListener('submit', async function (event) {
            event.preventDefault();

            const form = event.target;

            const data = {
                username: form.login_username.value.trim(),
                password: form.login_password.value
            };

            try {
                const response = await fetch('/api-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const loginData = await response.json();

                    if (loginData[1].role === "admin") {
                        alert("Login successful!");
                        window.location.href = "/admin-dashboard";
                        localStorage.setItem("role", "Admin");
                    } else if (loginData[1].role === "alumni") {
                        alert("Login successful!");
                        localStorage.setItem("role", "Alumni");
                        localStorage.setItem("username", loginData[4].username);
                        localStorage.setItem("FullName", loginData[3].FullName);
                        localStorage.setItem("alumni_id", loginData[2].alumni_id);

                        window.location.href = "/alumni-account#survey";
                    }
                } else {
                    const errorData = await response.json();
                    alert("Login failed: " + errorData.message);
                }
            } catch (error) {
                console.error("Error during login:", error);
                alert("An error occurred. Please try again.");
            }
        });
    </script>

</body>

</html>
