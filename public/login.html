<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Survey System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/assets/theme.css">
    <script src="/assets/theme.js" defer></script>
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e8ba3 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .theme-toggle-wrapper {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .logo-wrapper {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 4px 15px rgba(30, 60, 114, 0.3);
        }
        .btn-primary {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 60, 114, 0.4);
            background: linear-gradient(135deg, #2a5298, #1e3c72);
        }
        .form-control:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 0.2rem rgba(42, 82, 152, 0.25);
        }
        .btn-link {
            color: #2a5298;
            font-weight: 500;
        }
        .btn-link:hover {
            color: #1e3c72;
        }
    </style>
</head>

<body>
    <div class="theme-toggle-wrapper">
        <button type="button" class="btn btn-outline-light btn-sm" data-theme-toggle>
            <span data-theme-toggle-label>🌙</span>
        </button>
    </div>

    <div class="login-container">
        <div class="card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="logo-wrapper">
                        <img src="/psu-logo.png" alt="PSU Logo" height="50" width="50" class="rounded-circle">
                    </div>
                    <h1 class="h3 fw-bold mb-2">Alumni Survey System</h1>
                    <p class="text-muted small">Sign in or create an account</p>
                </div>

                <!-- LOGIN FORM -->
                <div id="loginForm">
                    <form id="loginFormElement">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <input type="text" name="login_username" class="form-control form-control-lg" autocomplete="username" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <input type="password" name="login_password" class="form-control form-control-lg" autocomplete="current-password" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">Login</button>
                    </form>

                    <div class="text-center">
                        <span class="text-muted small">Don't have an account?</span>
                        <button type="button" class="btn btn-link btn-sm text-decoration-none p-0 ms-1" onclick="showRegisterForm()">Register</button>
                    </div>
                </div>

                <!-- REGISTER FORM -->
                <div id="registerForm" class="d-none">
                    <form id="registerFormElement">
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <label class="form-label">First name</label>
                                <input type="text" class="form-control" name="register_fname" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Last name</label>
                                <input type="text" class="form-control" name="register_lname" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contact number</label>
                            <input type="text" class="form-control" name="register_contact_number" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" name="register_username" autocomplete="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="register_password" autocomplete="new-password" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Confirm password</label>
                            <input type="password" class="form-control" name="register_confirm_password" autocomplete="new-password" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">Register</button>
                    </form>

                    <div class="text-center">
                        <span class="text-muted small">Already have an account?</span>
                        <button type="button" class="btn btn-link btn-sm text-decoration-none p-0 ms-1" onclick="showLoginForm()">Login</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const loginCard = document.getElementById('loginForm');
        const registerCard = document.getElementById('registerForm');

        function showRegisterForm() {
            loginCard.classList.add('d-none');
            registerCard.classList.remove('d-none');
        }

        function showLoginForm() {
            loginCard.classList.remove('d-none');
            registerCard.classList.add('d-none');
        }

        const registerForm = document.querySelector('#registerFormElement');
        registerForm.addEventListener('submit', async function (event) {
            event.preventDefault();

            const form = event.target;

            const data = {
                fname: form.register_fname.value,
                lname: form.register_lname.value,
                contact_no: form.register_contact_number.value,
                username: form.register_username.value,
                password: form.register_password.value,
                confirm_password: form.register_confirm_password.value
            };

            if (data.password !== data.confirm_password) {
                alert("Passwords do not match!");
                return;
            }

            try {
                const response = await fetch('/api-register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fname: data.fname,
                        lname: data.lname,
                        contact_no: data.contact_no,
                        username: data.username,
                        password: data.password
                    })
                });

                if (response.ok) {
                    alert("Registration successful!");
                    showLoginForm();
                } else {
                    const errorData = await response.json();
                    alert("Registration failed: " + errorData.message);
                }
            } catch (error) {
                console.error("Error during registration:", error);
                alert("An error occurred. Please try again.");
            }
        });

        const loginForm = document.querySelector('#loginFormElement');
        loginForm.addEventListener('submit', async function (event) {
            event.preventDefault();

            const form = event.target;

	            const data = {
	                username: form.login_username.value.trim(),
	                password: form.login_password.value
	            };

            try {
                const response = await fetch('/api-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const loginData = await response.json();

                    if (loginData[1].role === "admin") {
                        alert("Login successful!");
                        window.location.href = "/admin-dashboard";
                        localStorage.setItem("role", "Admin");
                    } else if (loginData[1].role === "alumni") {
                        alert("Login successful!");
                        localStorage.setItem("role", "Alumni");
                        localStorage.setItem("username", loginData[4].username);
                        localStorage.setItem("FullName", loginData[3].FullName);
                        localStorage.setItem("alumni_id", loginData[2].alumni_id);

                        window.location.href = "/alumni-account#survey";
                    }
                } else {
                    const errorData = await response.json();
                    alert("Login failed: " + errorData.message);
                }
            } catch (error) {
                console.error("Error during login:", error);
                alert("An error occurred. Please try again.");
            }
        });
    </script>

</body>

</html>
